services:
  _defaults:
    public: true
    autowire: true
    autoconfigure: true

  # Services
  sc_giftcard_repair.service.fixer:
    class: ScGiftcardRepair\Service\GiftCardFixer
    arguments:
      - '@doctrine.dbal.default_connection'
      - '%database_prefix%'
      # giftCardProductId and giftCardCartRuleName use default values (857 / 'La carte cadeau')
      # To override for a different shop:
      # - 123           # giftCardProductId
      # - 'My gift card' # giftCardCartRuleName

  # Controllers
  sc_giftcard_repair.controller.main:
    class: ScGiftcardRepair\Controller\Admin\GiftCardRepairController
    arguments:
      - '@sc_giftcard_repair.service.fixer'
      - '@security.csrf.token_manager'
    calls:
      - [setContainer, ['@service_container']]
